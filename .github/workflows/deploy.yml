name: Deploy Admin Panel Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: admin-panel-frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy admin-panel-frontend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            cd ~/stock-exchange/admin-panel-frontend

            echo "Pulling latest admin-panel-frontend..."
            git fetch origin
            git checkout main
            git pull origin main

            cd ~/stock-exchange

            echo "Rebuilding only admin-panel-frontend..."
            sudo docker compose up -d --build admin-panel-frontend

            echo "Deployment status:"
            sudo docker compose ps admin-panel-frontend
